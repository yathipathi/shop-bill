<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yatra Expense Ledger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Cormorant:ital@0;1&display=swap');

  :root{
    --bg:#070b14;
    --panel:#0d1830;
    --panel-2:#0a1426;
    --field:#0a1322;
    --border:#1e2c47;
    --gold:#d9a62a;
    --gold-2:#caa544;
    --text:#eef1f6;
    --muted:#7e8aa3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(190,140,40,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(120,90,200,0.05), transparent 45%),
      var(--bg);
    font-family:'Cormorant', serif;
    color:var(--text);
    padding:40px 16px 80px;
  }
  h1,h2,.brand,label,button{font-family:'Cormorant Garamond', serif;}
  .wrap{max-width:680px;margin:0 auto;}

  .brand{
    text-align:center;
    letter-spacing:.18em;
    color:var(--muted);
    font-size:13px;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .brand span{color:var(--gold);}

  .card{
    background:linear-gradient(160deg,var(--panel),var(--panel-2));
    border:1px solid var(--border);
    border-radius:18px;
    padding:30px 28px 32px;
    box-shadow:0 30px 60px -30px rgba(0,0,0,.7);
    margin-bottom:26px;
  }
  .card-title{
    display:flex;align-items:center;gap:10px;
    font-size:26px;font-weight:700;letter-spacing:.01em;
    margin-bottom:22px;
  }
  .card-title .plus{color:var(--muted);font-size:22px;font-weight:400;}

  label.field-label{
    display:block;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
  }
  .field{margin-bottom:18px;}

  select,input{
    width:100%;
    background:var(--field);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-family:'Cormorant Garamond', serif;
    font-size:19px;
    padding:13px 16px;
    outline:none;
    appearance:none;
    -webkit-appearance:none;
  }
  select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1L7 7L13 1' stroke='%237e8aa3' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 16px center;
    cursor:pointer;
  }
  input::placeholder{color:#4d5773;font-style:italic;}
  select:focus,input:focus{border-color:var(--gold-2);box-shadow:0 0 0 3px rgba(217,166,42,.12);}

  .btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:18px;
    font-weight:700;
    letter-spacing:.04em;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-gold{
    background:linear-gradient(160deg,#e3b53a,#b8862a);
    color:#1a1305;
  }
  .btn-gold:hover{box-shadow:0 8px 24px -8px rgba(217,166,42,.5);}
  .btn-ghost{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
  }
  .btn-ghost:hover{border-color:var(--gold-2);color:var(--gold-2);}

  .ledger-head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:16px;
  }
  .ledger-head h2{font-size:22px;margin:0;font-weight:700;}
  .ledger-head .total{font-size:14px;color:var(--muted);letter-spacing:.05em;}
  .ledger-head .total b{color:var(--gold);font-size:17px;}

  table{width:100%;border-collapse:collapse;font-size:16px;}
  th{
    text-align:left;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--muted);
    padding:0 10px 10px;
    border-bottom:1px solid var(--border);
  }
  td{
    padding:12px 10px;
    border-bottom:1px solid rgba(30,44,71,.5);
    vertical-align:top;
  }
  tr:last-child td{border-bottom:none;}
  .amt{color:var(--gold);font-weight:600;text-align:right;white-space:nowrap;}
  .del{
    cursor:pointer;color:var(--muted);font-size:13px;
    border:none;background:none;font-family:inherit;
  }
  .del:hover{color:#d9544a;}
  .edit{
    cursor:pointer;color:var(--muted);font-size:13px;
    border:none;background:none;font-family:inherit;
    margin-right:8px;
  }
  .edit:hover{color:var(--gold-2);}
  .empty{
    text-align:center;color:var(--muted);
    font-style:italic;padding:30px 0;
  }
  .actions{display:flex;gap:12px;margin-top:18px;}
  .actions .btn{flex:1;}

  /* Petrol Pump Stop modal */
  .fuel-trigger{
    width:100%;
    background:transparent;
    border:1px solid #5a2e16;
    color:#ff8a4c;
    border-radius:12px;
    padding:14px;
    font-family:'Cormorant Garamond', serif;
    font-size:17px;
    font-weight:700;
    letter-spacing:.03em;
    cursor:pointer;
    margin-bottom:26px;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .fuel-trigger:hover{border-color:#ff8a4c;background:rgba(255,138,76,.06);}

  .modal-overlay{
    display:none;
    position:fixed;inset:0;
    background:rgba(2,4,10,.78);
    z-index:50;
    align-items:flex-start;
    justify-content:center;
    padding:40px 16px;
    overflow-y:auto;
  }
  .modal-overlay.open{display:flex;}

  .fuel-card{
    width:100%;
    max-width:560px;
    background:linear-gradient(160deg,#0d1830,#0a1426);
    border:1px solid #5a2e16;
    border-radius:18px;
    padding:30px 28px 32px;
    box-shadow:0 30px 70px -25px rgba(0,0,0,.85);
  }
  .fuel-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
  .fuel-head .emoji{font-size:34px;}
  .fuel-head h2{
    font-size:27px;font-weight:700;margin:0;
    color:#ff7a3d;letter-spacing:.01em;
  }
  .fuel-sub{color:var(--muted);font-size:17px;line-height:1.5;margin-bottom:22px;}

  .fuel-field{margin-bottom:18px;}
  .fuel-field label{
    display:block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:#8fa0bd;margin-bottom:8px;
  }
  .fuel-field input,.fuel-field select{
    width:100%;background:var(--field);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-family:'Cormorant Garamond', serif;
    font-size:19px;padding:13px 16px;outline:none;
  }
  .fuel-field select{appearance:none;-webkit-appearance:none;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1L7 7L13 1' stroke='%237e8aa3' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;background-position:right 16px center;
  }
  .fuel-field input:focus,.fuel-field select:focus{border-color:#ff7a3d;box-shadow:0 0 0 3px rgba(255,122,61,.15);}

  .fuel-actions{display:flex;gap:14px;margin-top:8px;}
  .fuel-btn{
    flex:1;border-radius:12px;padding:16px;font-size:17px;font-weight:700;
    font-family:'Cormorant Garamond', serif;cursor:pointer;letter-spacing:.03em;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .fuel-btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text);}
  .fuel-btn-cancel:hover{border-color:#ff7a3d;color:#ff7a3d;}
  .fuel-btn-save{background:linear-gradient(160deg,#ff8a4c,#d9551f);border:none;color:#1a0a02;}
  .fuel-btn-save:hover{box-shadow:0 8px 24px -8px rgba(255,122,61,.5);}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Char Dham <span>&middot;</span> Travel Ledger</div>

  <button class="fuel-trigger" id="fuelTriggerBtn">⛽ Quick Petrol Pump Stop</button>

  <div class="card">
    <div class="card-title"><span class="plus">+</span> Add New Expense</div>

    <div class="field">
      <label class="field-label">Date</label>
      <input id="date" type="date">
    </div>

    <div class="field">
      <label class="field-label">Category</label>
      <select id="category">
        <option>Fuel</option>
        <option>Accommodation</option>
        <option>Food</option>
        <option>Darshan</option>
        <option>Shopping</option>
        <option>Other</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">Paid By</label>
      <select id="paidBy">
        <option>Pandu</option>
        <option>Arun</option>
        <option>DVN</option>
        <option>Niranjan</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label">Description</label>
      <input id="description" type="text" placeholder="e.g. Toll Tax">
    </div>

    <div class="field">
      <label class="field-label">Amount (₹)</label>
      <input id="amount" type="number" min="0" step="0.01" placeholder="0">
    </div>

    <div class="field">
      <label class="field-label">Temple / Location</label>
      <input id="location" type="text" placeholder="e.g. Madurai">
    </div>

    <button class="btn btn-gold" id="addBtn"><span class="plus">+</span> Add Expense</button>
  </div>

  <div class="card">
    <div class="ledger-head">
      <h2>Ledger</h2>
      <div class="total">Total: <b id="totalAmt">₹0</b></div>
    </div>
    <table id="ledgerTable">
      <thead>
        <tr>
          <th>Date</th><th>Category</th><th>Paid By</th><th>Description</th><th>Location</th><th style="text-align:right">Amount</th><th></th><th></th>
        </tr>
      </thead>
      <tbody id="ledgerBody"></tbody>
    </table>
    <div id="emptyMsg" class="empty">No expenses added yet.</div>

    <div class="actions">
      <button class="btn btn-ghost" id="downloadBtn">Download as Excel</button>
      <button class="btn btn-ghost" id="clearBtn">Clear All</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="fuelOverlay">
  <div class="fuel-card">
    <div class="fuel-head">
      <span class="emoji">⛽</span>
      <h2>Petrol Pump Stop</h2>
    </div>
    <div class="fuel-sub">You've stopped at a petrol pump. Input the fuel details to log the refueling cost in your Expense Tracker.</div>

    <div class="fuel-field">
      <label>Date</label>
      <input id="fuelDate" type="date">
    </div>

    <div class="fuel-field">
      <label>Total Cost / Amount Paid (₹)</label>
      <input id="fuelTotal" type="number" min="0" step="0.01" placeholder="e.g. 2000">
    </div>

    <div class="fuel-field">
      <label>Paid By</label>
      <select id="fuelPaidBy">
        <option>Pandu</option>
        <option>Arun</option>
        <option>DVN</option>
        <option>Niranjan</option>
      </select>
    </div>

    <div class="fuel-field">
      <label>Fuel Price per Liter (₹)</label>
      <input id="fuelPrice" type="number" min="0" step="0.01" placeholder="102.50">
    </div>

    <div class="fuel-field">
      <label>Liters of Fuel Filled</label>
      <input id="fuelLiters" type="number" min="0" step="0.01" placeholder="0.00">
    </div>

    <div class="fuel-field">
      <label>Location / Pump Name</label>
      <input id="fuelLocation" type="text" placeholder="e.g. HP Fuel Station, near Srivilliputhur highway">
    </div>

    <div class="fuel-actions">
      <button class="fuel-btn fuel-btn-cancel" id="fuelCancelBtn">Skip / Cancel</button>
      <button class="fuel-btn fuel-btn-save" id="fuelSaveBtn">⛽ Save Fuel Cost</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editOverlay">
  <div class="fuel-card" style="border-color:var(--border);">
    <div class="fuel-head">
      <span class="emoji">✎</span>
      <h2 style="color:var(--gold);">Edit Expense</h2>
    </div>

    <div class="fuel-field">
      <label>Date</label>
      <input id="editDate" type="date">
    </div>

    <div class="fuel-field">
      <label>Category</label>
      <select id="editCategory">
        <option>Fuel</option>
        <option>Accommodation</option>
        <option>Food</option>
        <option>Darshan</option>
        <option>Shopping</option>
        <option>Other</option>
      </select>
    </div>

    <div class="fuel-field">
      <label>Paid By</label>
      <select id="editPaidBy">
        <option>Pandu</option>
        <option>Arun</option>
        <option>DVN</option>
        <option>Niranjan</option>
      </select>
    </div>

    <div class="fuel-field">
      <label>Description</label>
      <input id="editDescription" type="text" placeholder="e.g. Toll Tax">
    </div>

    <div class="fuel-field">
      <label>Amount (₹)</label>
      <input id="editAmount" type="number" min="0" step="0.01" placeholder="0">
    </div>

    <div class="fuel-field">
      <label>Temple / Location</label>
      <input id="editLocation" type="text" placeholder="e.g. Madurai">
    </div>

    <div class="fuel-actions">
      <button class="fuel-btn fuel-btn-cancel" id="editCancelBtn">Cancel</button>
      <button class="fuel-btn" id="editSaveBtn" style="background:linear-gradient(160deg,#e3b53a,#b8862a);color:#1a1305;">Save Changes</button>
    </div>
  </div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem('travelExpenses') || '[]');

function save(){
  localStorage.setItem('travelExpenses', JSON.stringify(expenses));
}

function todayISO(){
  return new Date().toISOString().split('T')[0];
}

function formatDisplayDate(iso){
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function fmt(n){
  return '₹' + Number(n).toLocaleString('en-IN', {maximumFractionDigits:2});
}

function render(){
  const body = document.getElementById('ledgerBody');
  const empty = document.getElementById('emptyMsg');
  body.innerHTML = '';
  if(expenses.length === 0){
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    expenses.forEach((e, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${e.date}</td>
        <td>${e.category}</td>
        <td>${e.paidBy}</td>
        <td>${e.description || '—'}</td>
        <td>${e.location || '—'}</td>
        <td class="amt">${fmt(e.amount)}</td>
        <td><button class="edit" data-i="${i}">Edit</button></td>
        <td><button class="del" data-i="${i}">✕</button></td>
      `;
      body.appendChild(tr);
    });
  }
  const total = expenses.reduce((s,e) => s + Number(e.amount), 0);
  document.getElementById('totalAmt').textContent = fmt(total);
}

document.getElementById('addBtn').addEventListener('click', () => {
  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;
  const paidBy = document.getElementById('paidBy').value;
  const description = document.getElementById('description').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const location = document.getElementById('location').value.trim();

  if(!amount || amount <= 0){
    alert('Please enter a valid amount.');
    return;
  }
  if(!date){
    alert('Please select a date.');
    return;
  }

  expenses.push({
    date: formatDisplayDate(date),
    category, paidBy, description, amount, location
  });

  document.getElementById('description').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('location').value = '';
  document.getElementById('date').value = todayISO();

  render();
  save();
});

document.getElementById('ledgerBody').addEventListener('click', (ev) => {
  if(ev.target.classList.contains('del')){
    const i = parseInt(ev.target.dataset.i, 10);
    expenses.splice(i, 1);
    render();
    save();
  }
  if(ev.target.classList.contains('edit')){
    openEditModal(parseInt(ev.target.dataset.i, 10));
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if(expenses.length === 0) return;
  if(confirm('Clear all expenses?')){
    expenses = [];
    render();
    save();
  }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  if(expenses.length === 0){
    alert('No expenses to download yet.');
    return;
  }

  const toRow = (e) => ({
    Date: e.date,
    Category: e.category,
    'Paid By': e.paidBy,
    Description: e.description,
    'Temple/Location': e.location,
    'Amount (₹)': Number(e.amount)
  });

  const colWidths = [{wch:12},{wch:14},{wch:14},{wch:26},{wch:20},{wch:14}];

  const wb = XLSX.utils.book_new();

  // Sheet 1: full ledger, all travelers
  const allRows = expenses.map(toRow);
  const allTotal = expenses.reduce((s,e) => s + Number(e.amount), 0);
  allRows.push({Date:'', Category:'', 'Paid By':'', Description:'', 'Temple/Location':'TOTAL', 'Amount (₹)': allTotal});
  const wsAll = XLSX.utils.json_to_sheet(allRows);
  wsAll['!cols'] = colWidths;
  XLSX.utils.book_append_sheet(wb, wsAll, 'All Expenses');

  // One sheet per fixed traveler name, in this order
  const names = ['Pandu', 'Arun', 'DVN', 'Niranjan'];
  names.forEach(name => {
    const personExpenses = expenses.filter(e => e.paidBy === name);
    const rows = personExpenses.map(toRow);
    const total = personExpenses.reduce((s,e) => s + Number(e.amount), 0);
    rows.push({Date:'', Category:'', 'Paid By':'', Description:'', 'Temple/Location':'TOTAL', 'Amount (₹)': total});
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = colWidths;
    XLSX.utils.book_append_sheet(wb, ws, name);
  });

  XLSX.writeFile(wb, 'travel-expenses.xlsx');
});

render();
document.getElementById('date').value = todayISO();

// Petrol Pump Stop modal
const fuelOverlay = document.getElementById('fuelOverlay');

document.getElementById('fuelTriggerBtn').addEventListener('click', () => {
  document.getElementById('fuelDate').value = todayISO();
  fuelOverlay.classList.add('open');
});

document.getElementById('fuelCancelBtn').addEventListener('click', () => {
  fuelOverlay.classList.remove('open');
});

fuelOverlay.addEventListener('click', (ev) => {
  if(ev.target === fuelOverlay) fuelOverlay.classList.remove('open');
});

document.getElementById('fuelSaveBtn').addEventListener('click', () => {
  const date = document.getElementById('fuelDate').value;
  const total = parseFloat(document.getElementById('fuelTotal').value);
  const paidBy = document.getElementById('fuelPaidBy').value;
  const price = parseFloat(document.getElementById('fuelPrice').value);
  const liters = parseFloat(document.getElementById('fuelLiters').value);
  const location = document.getElementById('fuelLocation').value.trim();

  if(!total || total <= 0){
    alert('Please enter a valid total cost.');
    return;
  }
  if(!date){
    alert('Please select a date.');
    return;
  }

  let description = 'Fuel refill';
  if(liters > 0) description += ` (${liters}L`;
  if(liters > 0 && price > 0) description += ` @ ₹${price}/L`;
  if(liters > 0) description += ')';

  expenses.push({
    date: formatDisplayDate(date),
    category: 'Fuel',
    paidBy,
    description,
    amount: total,
    location
  });

  document.getElementById('fuelTotal').value = '';
  document.getElementById('fuelPrice').value = '';
  document.getElementById('fuelLiters').value = '';
  document.getElementById('fuelLocation').value = '';

  render();
  save();
  fuelOverlay.classList.remove('open');
});

// Edit Expense modal
const editOverlay = document.getElementById('editOverlay');
let editingIndex = null;

function toISO(displayDate){
  const [d,m,y] = displayDate.split('/');
  return `${y}-${m}-${d}`;
}

function openEditModal(i){
  editingIndex = i;
  const e = expenses[i];
  document.getElementById('editDate').value = toISO(e.date);
  document.getElementById('editCategory').value = e.category;
  document.getElementById('editPaidBy').value = e.paidBy;
  document.getElementById('editDescription').value = e.description || '';
  document.getElementById('editAmount').value = e.amount;
  document.getElementById('editLocation').value = e.location || '';
  editOverlay.classList.add('open');
}

document.getElementById('editCancelBtn').addEventListener('click', () => {
  editOverlay.classList.remove('open');
});

editOverlay.addEventListener('click', (ev) => {
  if(ev.target === editOverlay) editOverlay.classList.remove('open');
});

document.getElementById('editSaveBtn').addEventListener('click', () => {
  if(editingIndex === null) return;
  const amount = parseFloat(document.getElementById('editAmount').value);
  const date = document.getElementById('editDate').value;
  if(!amount || amount <= 0){
    alert('Please enter a valid amount.');
    return;
  }
  if(!date){
    alert('Please select a date.');
    return;
  }
  expenses[editingIndex] = {
    ...expenses[editingIndex],
    date: formatDisplayDate(date),
    category: document.getElementById('editCategory').value,
    paidBy: document.getElementById('editPaidBy').value,
    description: document.getElementById('editDescription').value.trim(),
    amount,
    location: document.getElementById('editLocation').value.trim()
  };
  render();
  save();
  editOverlay.classList.remove('open');
  editingIndex = null;
});
</script>
</body>
</html>
